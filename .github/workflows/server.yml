name: Deploy to server

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy-server:
    runs-on: ubuntu-latest
    environment: HOST

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: npm install      

      - name: Build for server
        run: npm run build
      - name: Deploy to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST.SERVER_HOST }}
          username: ${{ secrets.HOST.SERVER_USER }}
          key: ${{ secrets.HOST.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/html"